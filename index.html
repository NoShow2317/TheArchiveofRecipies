<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Archive</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <nav class="navbar px-4 py-3">
    <span class="navbar-brand h1 mb-0 fw-bold">Recipe Archive</span>
  </nav>

  <div class="container mt-4">
    <div class="button-box-main shadow-sm">
      <input type="text" id="search-input" class="form-control w-50 border-dark" placeholder="Search recipes by name">
      <a href="./add_recipe.html" class="btn btn-custom-action">+ Add recipe</a>
      <a href="./stats.html" class="btn btn-custom-outline">Stats</a>
    </div>

    <div class="row justify-content-center mb-5 g-3">
      <div class="col-md-4">
        <select id="filter-category" class="form-select border-dark">
          <option value="">All categories</option>
          <option value="Breakfast">Breakfast</option>
          <option value="Lunch">Lunch</option>
          <option value="Dinner">Dinner</option>
          <option value="Dessert">Dessert</option>
        </select>
      </div>
      <div class="col-md-4">
        <select id="filter-sort" class="form-select border-dark">
          <option value="date-desc">Newest</option>
          <option value="name-asc">Name A–Z</option>
          <option value="time-asc">Shortest cook time</option>
        </select>
      </div>
      <div class="col-md-2 d-flex align-items-center justify-content-center">
        <input type="checkbox" id="filter-favorites" class="form-check-input border-dark">
        <label class="ms-2 fw-bold small">Show favorites</label>
      </div>
    </div>

    <div class="row" id="recipe-dashboard"></div>
  </div>

  <footer class="text-center py-4 mt-5">
    <a href="./contact_page.html" class="btn btn-link text-white text-decoration-none">Contact us</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
