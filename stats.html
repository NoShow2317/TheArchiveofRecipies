<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Archive Statistics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="d-flex flex-column min-vh-100">

  <nav class="navbar px-4 py-3">
    <a href="./index.html" class="btn btn-sm btn-custom-outline">← Home</a>
    <span class="navbar-brand h1 mb-0 fw-bold mx-auto">Archive overview</span>
  </nav>

  <div class="container mt-5 flex-grow-1">
    <div class="row g-4 justify-content-center mb-5">
      <div class="col-md-5">
        <div class="card p-4 text-center shadow-sm">
          <p class="text-muted small mb-1 fw-bold">Total entries</p>
          <h1 class="display-3 fw-bold" id="stat-total" style="color: #FF7F50;">0</h1>
        </div>
      </div>
      <div class="col-md-5">
        <div class="card p-4 text-center shadow-sm">
          <p class="text-muted small mb-1 fw-bold">Favorites</p>
          <h1 class="display-3 fw-bold" id="stat-favs" style="color: #FF6347;">0</h1>
        </div>
      </div>
      <div class="col-md-5">
        <div class="card p-4 text-center shadow-sm">
          <p class="text-muted small mb-1 fw-bold">Categories used</p>
          <h1 class="display-3 fw-bold" id="stat-cats" style="color: #5D4037;">0</h1>
        </div>
      </div>
      <div class="col-md-5">
        <div class="card p-4 text-center shadow-sm">
          <p class="text-muted small mb-1 fw-bold">Average cook time</p>
          <h1 class="display-3 fw-bold" id="stat-avg" style="color: #FFD966; -webkit-text-stroke: 1px #5D4037;">0</h1>
        </div>
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-md-10">
        <div class="button-box-main">
          <a href="./add_recipe.html" class="btn btn-custom-action">Add recipe</a>
          <a href="./index.html" class="btn btn-custom-outline px-5">Back to archive</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./app.js"></script>
  <script>
    $(document).ready(() => {
      const total = savedRecipes.length;
      const favs = savedRecipes.filter(r => r.favorite === "true").length;
      
      const cats = [...new Set(savedRecipes.map(r => r.category))].filter(c => c).length;
      
      let totalTime = 0;
      let count = 0;
      savedRecipes.forEach(r => {
        let t = parseInt(r.cook_time);
        if(!isNaN(t)) {
          totalTime += t;
          count++;
        }
      });
      const avg = count > 0 ? Math.round(totalTime / count) : 0;

      $("#stat-total").text(total);
      $("#stat-favs").text(favs);
      $("#stat-cats").text(cats);
      $("#stat-avg").text(avg + " min");
    });
  </script>
</body>
</html>
